<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hyunwoong Slides</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#fdfae7;--primary:#1e2bfa;--text:#111;--muted:#6b6b6b;--light:#9a9a9a;
--accent-l:rgba(30,43,250,.08);--border:rgba(30,43,250,.2);--card:rgba(30,43,250,.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Pretendard',sans-serif;color:var(--text);min-height:100vh}
.wrap{max-width:860px;margin:0 auto;padding:64px 24px 80px}
.accent{width:60px;height:4px;background:var(--primary);border-radius:2px;margin-bottom:22px}
h1{font-family:'Space Grotesk','Pretendard',sans-serif;font-weight:700;font-size:40px;letter-spacing:-.02em;margin-bottom:10px}
h1 span{color:var(--primary)}
.sub{color:var(--muted);font-size:16px;line-height:1.6;margin-bottom:44px}
.deck{display:block;text-decoration:none;color:inherit;background:var(--card);border:1.5px solid var(--border);
border-radius:14px;padding:26px 28px;margin-bottom:18px;transition:transform .15s, box-shadow .15s}
.deck:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(30,43,250,.12)}
.deck .date{font-family:'Space Grotesk',sans-serif;font-size:12.5px;letter-spacing:.05em;color:var(--light);margin-bottom:8px}
.deck h2{font-size:21px;font-weight:700;letter-spacing:-.01em;margin-bottom:8px}
.deck p{font-size:14px;color:var(--muted);line-height:1.6}
.tags{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
.tag{background:var(--accent-l);color:var(--primary);padding:4px 12px;border-radius:100px;
font-family:'Space Grotesk','Pretendard',sans-serif;font-weight:500;font-size:12px}
.extras{margin-top:12px;font-size:13px}
.extras a{color:var(--primary);text-decoration:underline;text-underline-offset:2px}
.empty{color:var(--light);font-size:14px}
footer{margin-top:56px;color:var(--light);font-size:12.5px;font-family:'Space Grotesk','Pretendard',sans-serif;letter-spacing:.04em}
</style>
</head>
<body>
<div class="wrap">
  <div class="accent"></div>
  <h1>Hyunwoong <span>Slides</span></h1>
  <div class="sub">박현웅이 업데이트하는 발표 자료 모음 — 덱을 선택하면 브라우저에서 바로 열립니다 (← → 키로 이동, F11 전체화면 권장)</div>
  <div id="list"><div class="empty">목록을 불러오는 중…</div></div>
  <footer>hyunwoong-web.github.io/hyunwoong-slides</footer>
</div>
<script>
fetch('decks.json').then(r => r.json()).then(m => {
  const list = document.getElementById('list');
  list.innerHTML = '';
  m.decks
    .sort((a, b) => b.date.localeCompare(a.date))
    .forEach(d => {
      const a = document.createElement('a');
      a.className = 'deck';
      a.href = `decks/${d.slug}/`;
      const extras = (d.extras || []).map(e =>
        `<a href="decks/${d.slug}/${e.path}" onclick="event.stopPropagation()">${e.label}</a>`).join(' · ');
      a.innerHTML = `
        <div class="date">${d.date}</div>
        <h2>${d.title}</h2>
        <p>${d.desc}</p>
        <div class="tags">${(d.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
        ${extras ? `<div class="extras">부속 자료: ${extras}</div>` : ''}`;
      list.appendChild(a);
    });
}).catch(() => {
  document.getElementById('list').innerHTML = '<div class="empty">decks.json을 불러오지 못했습니다.</div>';
});
</script>
</body>
</html>
